<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Mini App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            padding: 20px;
        }
        .switch {
            display: flex;
            background: #f0f0f0;
            border-radius: 30px;
            padding: 5px;
            margin-bottom: 20px;
        }
        .switch button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 30px;
            background: transparent;
            font-weight: 600;
            cursor: pointer;
        }
        .switch button.active {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            color: #667eea;
        }
        .form {
            display: block;
        }
        .form.hidden {
            display: none;
        }
        .panel {
            display: none;
        }
        .panel.visible {
            display: block;
        }
        h2 {
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .error {
            color: #ff4757;
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 15px;
            display: none;
        }
        .error.visible {
            display: block;
        }
        .info {
            background: #333;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }
        .info.visible {
            display: block;
        }
        .link-list {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 15px;
            padding: 10px;
        }
        .link-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .link-item:last-child {
            border-bottom: none;
        }
        .delete {
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- Переключатель режимов -->
        <div class="switch">
            <button class="active" id="switchAdmin">👤 Админ</button>
            <button id="switchUser">👥 Пользователь</button>
        </div>

        <!-- Форма входа для админа -->
        <div id="adminForm" class="form">
            <h2>Вход для админа</h2>
            <input type="password" id="adminPass" placeholder="Пароль">
            <button id="adminLogin">Войти</button>
            <div class="error" id="adminError">Неверный пароль</div>
        </div>

        <!-- Форма входа для пользователя -->
        <div id="userForm" class="form hidden">
            <h2>Вход для пользователя</h2>
            <input type="text" id="username" placeholder="Имя пользователя" value="Sdback">
            <input type="text" id="userCode" placeholder="6-значный код" maxlength="6" value="345f77">
            <button id="userLogin">Войти</button>
            <div class="error" id="userError">Неверные данные</div>
        </div>

        <!-- Панель администратора -->
        <div id="adminPanel" class="panel">
            <div class="info" id="adminInfo"></div>
            <button id="logoutAdmin">🚪 Выйти</button>
            <button id="createAdminLink">🔗 Создать ссылку для админа</button>
            <button id="createUserLink">👤 Создать ссылку для пользователя</button>
            <h3 style="margin-top:20px;">Созданные ссылки</h3>
            <div class="link-list" id="linkList"></div>
        </div>

        <!-- Панель пользователя -->
        <div id="userPanel" class="panel">
            <div class="info" id="userInfo"></div>
            <button id="logoutUser">🚪 Выйти</button>
            <p>Добро пожаловать в обычный аккаунт!</p>
        </div>
    </div>

    <script>
        // ==================== НАСТРОЙКИ ====================
        const ADMIN_PASSWORD = 'A7k9pL';
        const USERS = { 'Sdback': '345f77' };
        const APP_BASE_URL = 'https://USERNAME.github.io/REPO/'; // ЗАМЕНИТЕ

        const STORAGE_LINKS = 'links';
        const STORAGE_SESSION = 'session';

        // ==================== ЭЛЕМЕНТЫ ====================
        const switchAdmin = document.getElementById('switchAdmin');
        const switchUser = document.getElementById('switchUser');
        const adminForm = document.getElementById('adminForm');
        const userForm = document.getElementById('userForm');
        const adminPanel = document.getElementById('adminPanel');
        const userPanel = document.getElementById('userPanel');
        const adminPass = document.getElementById('adminPass');
        const adminLogin = document.getElementById('adminLogin');
        const adminError = document.getElementById('adminError');
        const username = document.getElementById('username');
        const userCode = document.getElementById('userCode');
        const userLogin = document.getElementById('userLogin');
        const userError = document.getElementById('userError');
        const logoutAdmin = document.getElementById('logoutAdmin');
        const logoutUser = document.getElementById('logoutUser');
        const createAdminLink = document.getElementById('createAdminLink');
        const createUserLink = document.getElementById('createUserLink');
        const linkList = document.getElementById('linkList');
        const adminInfo = document.getElementById('adminInfo');
        const userInfo = document.getElementById('userInfo');

        // ==================== СОСТОЯНИЕ ====================
        let currentMode = 'admin';
        let loggedIn = false;
        let sessionType = null;
        let sessionUser = null;

        // ==================== ХРАНИЛИЩЕ ====================
        function loadLinks() {
            const stored = localStorage.getItem(STORAGE_LINKS);
            return stored ? JSON.parse(stored) : [];
        }
        function saveLinks(links) {
            localStorage.setItem(STORAGE_LINKS, JSON.stringify(links));
        }
        function loadSession() {
            const s = localStorage.getItem(STORAGE_SESSION);
            if (s) {
                try {
                    const sess = JSON.parse(s);
                    if (sess.type === 'admin') {
                        loggedIn = true;
                        sessionType = 'admin';
                        showAdminPanel();
                    } else if (sess.type === 'user') {
                        loggedIn = true;
                        sessionType = 'user';
                        sessionUser = sess.user;
                        showUserPanel(sess.user);
                    }
                } catch (e) {}
            }
        }
        function saveSession(type, user = null) {
            const sess = { type };
            if (type === 'user') sess.user = user;
            localStorage.setItem(STORAGE_SESSION, JSON.stringify(sess));
        }
        function clearSession() {
            localStorage.removeItem(STORAGE_SESSION);
        }

        // ==================== ОТОБРАЖЕНИЕ ====================
        function showAdminPanel() {
            adminForm.classList.add('hidden');
            userForm.classList.add('hidden');
            adminPanel.classList.add('visible');
            userPanel.classList.remove('visible');
            renderLinks();
        }
        function showUserPanel(user) {
            adminForm.classList.add('hidden');
            userForm.classList.add('hidden');
            adminPanel.classList.remove('visible');
            userPanel.classList.add('visible');
            userInfo.textContent = `Вы вошли как ${user}`;
        }
        function showLoginForms() {
            adminForm.classList.remove('hidden');
            userForm.classList.remove('hidden');
            adminPanel.classList.remove('visible');
            userPanel.classList.remove('visible');
        }
        function showInfo(el, msg, isError = false) {
            el.textContent = msg;
            el.classList.add('visible');
            el.style.background = isError ? '#ff4757' : '#333';
            setTimeout(() => el.classList.remove('visible'), 3000);
        }
        function switchMode(mode) {
            currentMode = mode;
            if (mode === 'admin') {
                switchAdmin.classList.add('active');
                switchUser.classList.remove('active');
                if (!loggedIn || sessionType !== 'admin') {
                    adminForm.classList.remove('hidden');
                    userForm.classList.add('hidden');
                } else {
                    showAdminPanel();
                }
            } else {
                switchUser.classList.add('active');
                switchAdmin.classList.remove('active');
                if (!loggedIn || sessionType !== 'user') {
                    userForm.classList.remove('hidden');
                    adminForm.classList.add('hidden');
                } else {
                    showUserPanel(sessionUser);
                }
            }
        }

        // ==================== ССЫЛКИ ====================
        function generateCode() {
            return Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
        }
        function createLink(type, user = null) {
            const code = generateCode();
            const links = loadLinks();
            links.push({ code, type, user });
            saveLinks(links);
            const botLink = `https://t.me/BJPEbot?start=${code}`;
            navigator.clipboard.writeText(botLink).then(() => {
                showInfo(adminInfo, 'Ссылка скопирована');
            }).catch(() => {
                showInfo(adminInfo, botLink, true);
            });
            renderLinks();
        }
        function deleteLink(code) {
            let links = loadLinks();
            links = links.filter(l => l.code !== code);
            saveLinks(links);
            renderLinks();
        }
        function renderLinks() {
            const links = loadLinks();
            linkList.innerHTML = '';
            if (links.length === 0) {
                linkList.innerHTML = '<p style="text-align:center;color:#999;">Нет ссылок</p>';
                return;
            }
            links.forEach(link => {
                const div = document.createElement('div');
                div.className = 'link-item';
                div.innerHTML = `
                    <div>
                        <strong>${link.type === 'admin' ? '👑 Админ' : '👤 ' + (link.user || '')}</strong>
                        <div style="font-size:11px;color:#666;">${link.code}</div>
                    </div>
                    <button class="delete" data-code="${link.code}">✕</button>
                `;
                linkList.appendChild(div);
            });
            document.querySelectorAll('.delete').forEach(btn => {
                btn.addEventListener('click', e => {
                    deleteLink(e.target.dataset.code);
                });
            });
        }

        // ==================== ВХОД ПО ССЫЛКЕ ====================
        function getUrlParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }
        function checkInvite() {
            const code = getUrlParam('code');
            if (!code) return false;
            const links = loadLinks();
            const link = links.find(l => l.code === code);
            if (link) {
                if (link.type === 'admin') {
                    loggedIn = true;
                    sessionType = 'admin';
                    saveSession('admin');
                    showAdminPanel();
                    switchMode('admin');
                } else {
                    loggedIn = true;
                    sessionType = 'user';
                    sessionUser = link.user;
                    saveSession('user', link.user);
                    showUserPanel(link.user);
                    switchMode('user');
                }
                return true;
            } else {
                showInfo(adminInfo, 'Ссылка недействительна', true);
                return false;
            }
        }

        // ==================== ВХОД ====================
        adminLogin.addEventListener('click', () => {
            if (adminPass.value === ADMIN_PASSWORD) {
                loggedIn = true;
                sessionType = 'admin';
                saveSession('admin');
                showAdminPanel();
                switchMode('admin');
                adminError.classList.remove('visible');
            } else {
                adminError.classList.add('visible');
            }
        });
        userLogin.addEventListener('click', () => {
            const user = username.value.trim();
            const code = userCode.value.trim();
            if (USERS[user] && USERS[user] === code) {
                loggedIn = true;
                sessionType = 'user';
                sessionUser = user;
                saveSession('user', user);
                showUserPanel(user);
                switchMode('user');
                userError.classList.remove('visible');
            } else {
                userError.classList.add('visible');
            }
        });

        // ==================== ВЫХОД ====================
        function logout() {
            loggedIn = false;
            sessionType = null;
            sessionUser = null;
            clearSession();
            showLoginForms();
            switchMode(currentMode);
        }
        logoutAdmin.addEventListener('click', logout);
        logoutUser.addEventListener('click', logout);

        // ==================== СОЗДАНИЕ ССЫЛОК ====================
        createAdminLink.addEventListener('click', () => createLink('admin'));
        createUserLink.addEventListener('click', () => createLink('user', 'Sdback'));

        // ==================== ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ ====================
        switchAdmin.addEventListener('click', () => switchMode('admin'));
        switchUser.addEventListener('click', () => switchMode('user'));

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        window.onload = () => {
            loadSession();
            if (loggedIn) {
                if (sessionType === 'admin') {
                    showAdminPanel();
                    switchMode('admin');
                } else {
                    showUserPanel(sessionUser);
                    switchMode('user');
                }
            } else {
                if (!checkInvite()) {
                    showLoginForms();
                    switchMode('admin');
                }
            }
            if (window.Telegram?.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
            }
        };
    </script>
</body>
</html>
