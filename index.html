<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Промокоды + Кастомная дверь</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow: hidden;
            position: relative;
        }
        /* Анимация загрузки (кастомная дверь) */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0f0c1f, #1a1a2e);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .door-container {
            position: relative;
            width: 240px;
            height: 360px;
            perspective: 800px;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.6));
        }
        /* Дверь с текстурой дерева */
        .door {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #8b5a2b;
            background-image: repeating-linear-gradient(45deg, rgba(255,215,140,0.2) 0px, rgba(255,215,140,0.2) 10px, rgba(0,0,0,0.05) 10px, rgba(0,0,0,0.05) 20px);
            border: 8px solid #5a3e1b;
            border-radius: 30px;
            box-shadow: 
                inset 0 0 30px rgba(0,0,0,0.5),
                0 20px 30px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            z-index: 2;
            backface-visibility: hidden;
            overflow: hidden;
        }
        .door::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 2px solid rgba(255,215,140,0.3);
            border-radius: 20px;
            pointer-events: none;
        }
        .door.open {
            transform: rotateY(-110deg);
        }
        /* Дверная ручка (винтажная) */
        .door-handle {
            position: absolute;
            right: 25px;
            top: 50%;
            width: 30px;
            height: 70px;
            background: linear-gradient(145deg, #c0a062, #9c7a4a);
            border-radius: 15px;
            transform: translateY(-50%);
            box-shadow: 
                2px 2px 8px rgba(0,0,0,0.5),
                inset -1px -1px 3px rgba(0,0,0,0.5),
                inset 2px 2px 5px rgba(255,255,200,0.3);
            border: 2px solid #5a3e1b;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .door-handle::after {
            content: '';
            width: 14px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #e0c080, #8b6b3a);
            border-radius: 8px;
            box-shadow: inset 1px 1px 4px rgba(255,255,200,0.5);
        }
        /* Замок (более детальный) */
        .lock {
            position: absolute;
            left: 50%;
            top: 65%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            background: #3a4a5e;
            border-radius: 15px 15px 20px 20px;
            border: 4px solid #1f2a36;
            box-shadow: 
                inset 0 0 10px #0a0f14,
                0 5px 0 #0f1a24;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .lock-hole {
            width: 30px;
            height: 40px;
            background: #1e2b38;
            border-radius: 8px;
            box-shadow: inset 0 0 10px #000;
            border: 2px solid #0f1419;
            position: relative;
        }
        .lock-hole::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: #c9a03d;
            border-radius: 50%;
            box-shadow: 0 0 5px #ffd966;
        }
        /* Ключ (стимпанк-стиль) */
        .key {
            position: absolute;
            left: 50%;
            top: 65%;
            transform: translateX(-50%);
            width: 30px;
            height: 100px;
            background: radial-gradient(circle at 30% 20%, #f0d080, #b38b40);
            border-radius: 15px 15px 8px 8px;
            box-shadow: 
                2px 5px 10px rgba(0,0,0,0.5),
                inset -2px -2px 5px rgba(0,0,0,0.3),
                inset 2px 2px 8px rgba(255,255,200,0.6);
            border: 2px solid #8b6a2a;
            z-index: 3;
            opacity: 0;
            transform-origin: center 70%;
        }
        .key::before {
            content: '';
            position: absolute;
            top: -30px;
            left: 0;
            width: 30px;
            height: 40px;
            background: inherit;
            border-radius: 20px 20px 0 0;
            box-shadow: inherit;
            border-bottom: 3px solid #b38b40;
        }
        .key::after {
            content: '';
            position: absolute;
            top: -20px;
            left: 8px;
            width: 14px;
            height: 25px;
            background: #c9a03d;
            border-radius: 30%;
            box-shadow: inset -1px -1px 5px #5a3e1b;
        }
        .key.fly {
            animation: flyToLock 0.8s forwards;
        }
        .key.turn {
            animation: turnKey 0.6s forwards;
        }
        @keyframes flyToLock {
            0% { transform: translateX(-50%) translateY(-120px) rotate(-20deg); opacity: 1; }
            100% { transform: translateX(-50%) translateY(0) rotate(0deg); opacity: 1; }
        }
        @keyframes turnKey {
            0% { transform: translateX(-50%) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(90deg); }
        }
        /* Декоративные петли */
        .door::after {
            content: '';
            position: absolute;
            left: -5px;
            top: 40px;
            width: 20px;
            height: 80px;
            background: linear-gradient(145deg, #7f8c8d, #5a6b6c);
            border-radius: 10px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.5);
            border: 2px solid #3a4a4b;
        }
        /* Вторая петля */
        .door-frame {
            position: absolute;
            width: 260px;
            height: 380px;
            border: 10px solid #4a3720;
            border-radius: 40px;
            top: -10px;
            left: -10px;
            z-index: 1;
            box-shadow: 0 0 0 4px #8b6a3a, inset 0 0 20px #2e1e0e;
            background: transparent;
        }
        .loading-text {
            margin-top: 40px;
            color: #f0e6d2;
            font-size: 22px;
            letter-spacing: 4px;
            text-shadow: 0 0 15px #b8860b, 2px 2px 0 #2a1e0e;
            font-weight: 300;
        }
        /* ОСНОВНОЕ ПРИЛОЖЕНИЕ (стили как в предыдущей версии, но без изменений) */
        .app {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            padding: 20px;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .app.visible {
            opacity: 1;
            transform: scale(1);
        }
        /* Всё остальные стили (переключатели, формы, списки, радуга) остаются без изменений, как в предыдущем ответе */
        .switch {
            display: flex;
            background: #f0f0f0;
            border-radius: 30px;
            padding: 5px;
            margin-bottom: 20px;
        }
        .switch button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 30px;
            background: transparent;
            font-weight: 600;
            cursor: pointer;
        }
        .switch button.active {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            color: #667eea;
        }
        .form {
            display: block;
        }
        .form.hidden {
            display: none;
        }
        .panel {
            display: none;
        }
        .panel.visible {
            display: block;
        }
        h2, h3 {
            margin-bottom: 15px;
            color: #333;
            text-align: center;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 16px;
            outline: none;
        }
        input:focus, textarea:focus {
            border-color: #667eea;
        }
        textarea {
            min-height: 70px;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .error {
            color: #ff4757;
            font-size: 14px;
            margin-top: -8px;
            margin-bottom: 12px;
            display: none;
        }
        .error.visible {
            display: block;
        }
        .info {
            background: #333;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }
        .info.visible {
            display: block;
        }
        .code-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 15px;
            padding: 10px;
        }
        .code-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .code-item:last-child {
            border-bottom: none;
        }
        .code-info {
            flex: 1;
        }
        .code-title {
            font-weight: 600;
            font-family: monospace;
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 8px;
            display: inline-block;
        }
        .code-text {
            font-size: 13px;
            color: #555;
            margin-top: 4px;
            word-break: break-word;
        }
        .code-meta {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }
        .delete {
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 5px 10px;
            cursor: pointer;
            margin-left: 8px;
        }
        .rainbow {
            animation: rainbow 5s infinite;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
        }
        @keyframes rainbow {
            0% { background: #ff0000; }
            17% { background: #ff8800; }
            33% { background: #ffff00; }
            50% { background: #00ff00; }
            67% { background: #0088ff; }
            83% { background: #8800ff; }
            100% { background: #ff0000; }
        }
        .activate-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }
        .flex-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .flex-row input {
            flex: 1;
            margin-bottom: 0;
        }
        .small-input {
            width: 80px;
        }
    </style>
</head>
<body>
    <!-- Кастомная дверь с анимацией -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="door-container">
            <div class="door" id="door">
                <div class="door-handle"></div>
                <div class="lock">
                    <div class="lock-hole"></div>
                </div>
            </div>
            <div class="key" id="key"></div>
            <div class="door-frame"></div>
        </div>
        <div class="loading-text" id="loadingText">Открываем доступ...</div>
    </div>

    <!-- Основное приложение (скрыто до окончания анимации) -->
    <div class="app" id="app">
        <!-- Переключатель режимов -->
        <div class="switch">
            <button class="active" id="switchAdmin">👤 Админ</button>
            <button id="switchUser">👥 Пользователь</button>
        </div>

        <!-- Форма входа для админа -->
        <div id="adminForm" class="form">
            <h2>Вход для админа</h2>
            <input type="password" id="adminPass" placeholder="Пароль">
            <button id="adminLogin">Войти</button>
            <div class="error" id="adminError">Неверный пароль</div>
        </div>

        <!-- Форма входа для пользователя -->
        <div id="userForm" class="form hidden">
            <h2>Вход для пользователя</h2>
            <input type="text" id="username" placeholder="Имя пользователя" value="Sdback">
            <input type="text" id="userCode" placeholder="6-значный код" maxlength="6" value="345f77">
            <button id="userLogin">Войти</button>
            <div class="error" id="userError">Неверные данные</div>
        </div>

        <!-- Панель администратора с радугой -->
        <div id="adminPanel" class="panel">
            <div class="rainbow">
                <div class="info" id="adminInfo"></div>
                <button id="logoutAdmin">🚪 Выйти</button>
                <h3>Создание промокода</h3>
                <textarea id="promoText" placeholder="Текст, который увидит пользователь при активации"></textarea>
                <div class="flex-row">
                    <input type="number" id="expiryDays" class="small-input" placeholder="Дней" min="0" value="0">
                    <span style="font-size:14px;">(0 = вечный)</span>
                </div>
                <button id="generateCode">✨ Сгенерировать код</button>
            </div>
            <h3 style="margin-top:20px;">Созданные коды</h3>
            <div class="code-list" id="codeList"></div>
        </div>

        <!-- Панель пользователя -->
        <div id="userPanel" class="panel">
            <div class="info" id="userInfo"></div>
            <button id="logoutUser">🚪 Выйти</button>
            <p>Добро пожаловать, <span id="userNameDisplay"></span>!</p>
            
            <div class="activate-section">
                <h3>Активировать промокод</h3>
                <input type="text" id="activateCode" placeholder="Введите код" maxlength="20">
                <button id="activateBtn">Активировать</button>
                <div class="info" id="activationResult"></div>
            </div>
        </div>
    </div>

    <script>
        // ==================== АНИМАЦИЯ ЗАГРУЗКИ ====================
        const loadingOverlay = document.getElementById('loadingOverlay');
        const door = document.getElementById('door');
        const key = document.getElementById('key');
        const loadingText = document.getElementById('loadingText');
        const app = document.getElementById('app');

        function startLoadingAnimation() {
            // Шаг 1: ключ влетает
            setTimeout(() => {
                key.classList.add('fly');
                loadingText.textContent = 'Ключ вставлен...';
            }, 500);
            // Шаг 2: ключ поворачивается
            setTimeout(() => {
                key.classList.remove('fly');
                key.classList.add('turn');
                loadingText.textContent = 'Поворачиваем ключ...';
            }, 1300);
            // Шаг 3: дверь открывается
            setTimeout(() => {
                door.classList.add('open');
                loadingText.textContent = 'Дверь открыта!';
            }, 2000);
            // Шаг 4: туман и появление приложения
            setTimeout(() => {
                loadingOverlay.classList.add('hidden');
                app.classList.add('visible');
            }, 3200);
        }

        window.addEventListener('load', startLoadingAnimation);

        // ==================== ОСНОВНОЙ ФУНКЦИОНАЛ (ПРОМОКОДЫ) ====================
        // Полный код из предыдущего ответа (логика с промокодами, входом, статистикой)
        // Вставляем сюда весь скрипт из предыдущего шага (он уже был полностью приведён)
        // Для краткости я покажу только ключевые функции, но в реальном ответе должно быть всё.

        // КОНФИГУРАЦИЯ
        const ADMIN_PASSWORD = 'A7k9pL';
        const USERS = { 'Sdback': '345f77' };
        const STORAGE_CODES = 'promo_codes';
        const STORAGE_SESSION = 'session';

        // Все элементы интерфейса (объявляем их)
        const switchAdmin = document.getElementById('switchAdmin');
        const switchUser = document.getElementById('switchUser');
        const adminForm = document.getElementById('adminForm');
        const userForm = document.getElementById('userForm');
        const adminPanel = document.getElementById('adminPanel');
        const userPanel = document.getElementById('userPanel');
        const adminPass = document.getElementById('adminPass');
        const adminLogin = document.getElementById('adminLogin');
        const adminError = document.getElementById('adminError');
        const username = document.getElementById('username');
        const userCode = document.getElementById('userCode');
        const userLogin = document.getElementById('userLogin');
        const userError = document.getElementById('userError');
        const logoutAdmin = document.getElementById('logoutAdmin');
        const logoutUser = document.getElementById('logoutUser');
        const promoText = document.getElementById('promoText');
        const expiryDays = document.getElementById('expiryDays');
        const generateCode = document.getElementById('generateCode');
        const codeList = document.getElementById('codeList');
        const adminInfo = document.getElementById('adminInfo');
        const userInfo = document.getElementById('userInfo');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const activateCode = document.getElementById('activateCode');
        const activateBtn = document.getElementById('activateBtn');
        const activationResult = document.getElementById('activationResult');

        // Состояние
        let currentMode = 'admin';
        let loggedIn = false;
        let sessionType = null;
        let sessionUser = null;

        // Функции хранилища (loadCodes, saveCodes, loadSession, saveSession, clearSession)
        function loadCodes() {
            const stored = localStorage.getItem(STORAGE_CODES);
            return stored ? JSON.parse(stored) : [];
        }
        function saveCodes(codes) {
            localStorage.setItem(STORAGE_CODES, JSON.stringify(codes));
        }
        function loadSession() {
            const s = localStorage.getItem(STORAGE_SESSION);
            if (s) {
                try {
                    const sess = JSON.parse(s);
                    if (sess.type === 'admin') {
                        loggedIn = true;
                        sessionType = 'admin';
                        showAdminPanel();
                    } else if (sess.type === 'user') {
                        loggedIn = true;
                        sessionType = 'user';
                        sessionUser = sess.user;
                        showUserPanel(sess.user);
                    }
                } catch (e) {}
            }
        }
        function saveSession(type, user = null) {
            const sess = { type };
            if (type === 'user') sess.user = user;
            localStorage.setItem(STORAGE_SESSION, JSON.stringify(sess));
        }
        function clearSession() {
            localStorage.removeItem(STORAGE_SESSION);
        }

        // Функции отображения (showAdminPanel, showUserPanel, showLoginForms, showInfo, switchMode)
        function showAdminPanel() {
            adminForm.classList.add('hidden');
            userForm.classList.add('hidden');
            adminPanel.classList.add('visible');
            userPanel.classList.remove('visible');
            renderCodes();
        }
        function showUserPanel(user) {
            adminForm.classList.add('hidden');
            userForm.classList.add('hidden');
            adminPanel.classList.remove('visible');
            userPanel.classList.add('visible');
            userInfo.textContent = `Вы вошли как ${user}`;
            userNameDisplay.textContent = user;
            activateCode.value = '';
            activationResult.classList.remove('visible');
        }
        function showLoginForms() {
            adminForm.classList.remove('hidden');
            userForm.classList.remove('hidden');
            adminPanel.classList.remove('visible');
            userPanel.classList.remove('visible');
        }
        function showInfo(el, msg, isError = false) {
            el.textContent = msg;
            el.classList.add('visible');
            el.style.background = isError ? '#ff4757' : '#333';
            setTimeout(() => el.classList.remove('visible'), 3000);
        }
        function switchMode(mode) {
            currentMode = mode;
            if (mode === 'admin') {
                switchAdmin.classList.add('active');
                switchUser.classList.remove('active');
                if (!loggedIn || sessionType !== 'admin') {
                    adminForm.classList.remove('hidden');
                    userForm.classList.add('hidden');
                } else {
                    showAdminPanel();
                }
            } else {
                switchUser.classList.add('active');
                switchAdmin.classList.remove('active');
                if (!loggedIn || sessionType !== 'user') {
                    userForm.classList.remove('hidden');
                    adminForm.classList.add('hidden');
                } else {
                    showUserPanel(sessionUser);
                }
            }
        }

        // Работа с промокодами (createPromoCode, deleteCode, renderCodes, activatePromoCode)
        function generateRandomCode(length = 8) {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }
        function createPromoCode() {
            const text = promoText.value.trim();
            if (!text) {
                showInfo(adminInfo, 'Введите текст для кода', true);
                return;
            }
            const days = parseInt(expiryDays.value, 10);
            const expiresInDays = (isNaN(days) || days <= 0) ? null : days;
            const code = generateRandomCode(8);
            const codes = loadCodes();
            if (codes.find(c => c.code === code)) {
                createPromoCode();
                return;
            }
            codes.push({
                code,
                text,
                expiresInDays,
                uses: [],
                createdAt: new Date().toISOString()
            });
            saveCodes(codes);
            promoText.value = '';
            expiryDays.value = '0';
            showInfo(adminInfo, `Код ${code} создан`);
            renderCodes();
        }
        function deleteCode(code) {
            let codes = loadCodes();
            codes = codes.filter(c => c.code !== code);
            saveCodes(codes);
            renderCodes();
        }
        function renderCodes() {
            const codes = loadCodes();
            codeList.innerHTML = '';
            if (codes.length === 0) {
                codeList.innerHTML = '<p style="text-align:center;color:#999;">Нет созданных кодов</p>';
                return;
            }
            codes.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
            codes.forEach(item => {
                const div = document.createElement('div');
                div.className = 'code-item';
                const useCount = item.uses ? item.uses.length : 0;
                let lastUse = 'никогда';
                if (item.uses && item.uses.length > 0) {
                    const last = new Date(item.uses[item.uses.length-1]);
                    lastUse = last.toLocaleString();
                }

                let expiryStatus = '∞ вечный';
                if (item.expiresInDays) {
                    const created = new Date(item.createdAt);
                    const expiryDate = new Date(created.getTime() + item.expiresInDays * 24 * 60 * 60 * 1000);
                    const now = new Date();
                    const daysLeft = Math.ceil((expiryDate - now) / (1000 * 60 * 60 * 24));
                    if (daysLeft > 0) {
                        expiryStatus = `⚠️ истекает через ${daysLeft} дн.`;
                    } else if (daysLeft === 0) {
                        expiryStatus = '⚠️ истекает сегодня';
                    } else {
                        expiryStatus = '❌ истёк';
                    }
                }

                div.innerHTML = `
                    <div class="code-info">
                        <span class="code-title">${item.code}</span>
                        <div class="code-text">${item.text}</div>
                        <div class="code-meta">Активаций: ${useCount} (последняя: ${lastUse})</div>
                        <div class="code-meta">${expiryStatus}</div>
                    </div>
                    <button class="delete" data-code="${item.code}">✕</button>
                `;
                codeList.appendChild(div);
            });
            document.querySelectorAll('.delete').forEach(btn => {
                btn.addEventListener('click', e => {
                    deleteCode(e.target.dataset.code);
                });
            });
        }
        function activatePromoCode() {
            const inputCode = activateCode.value.trim();
            if (!inputCode) {
                showInfo(activationResult, 'Введите код', true);
                return;
            }
            const codes = loadCodes();
            const foundIndex = codes.findIndex(c => c.code === inputCode);
            if (foundIndex === -1) {
                showInfo(activationResult, 'Неверный код', true);
                return;
            }
            const found = codes[foundIndex];

            if (found.expiresInDays) {
                const created = new Date(found.createdAt);
                const expiryDate = new Date(created.getTime() + found.expiresInDays * 24 * 60 * 60 * 1000);
                const now = new Date();
                if (now > expiryDate) {
                    showInfo(activationResult, 'Код истёк', true);
                    return;
                }
            }

            if (!found.uses) found.uses = [];
            found.uses.push(Date.now());
            saveCodes(codes);
            showInfo(activationResult, found.text, false);
        }

        // Обработчики входа
        adminLogin.addEventListener('click', () => {
            if (adminPass.value === ADMIN_PASSWORD) {
                loggedIn = true;
                sessionType = 'admin';
                saveSession('admin');
                showAdminPanel();
                switchMode('admin');
                adminError.classList.remove('visible');
            } else {
                adminError.classList.add('visible');
            }
        });
        userLogin.addEventListener('click', () => {
            const user = username.value.trim();
            const code = userCode.value.trim();
            if (USERS[user] && USERS[user] === code) {
                loggedIn = true;
                sessionType = 'user';
                sessionUser = user;
                saveSession('user', user);
                showUserPanel(user);
                switchMode('user');
                userError.classList.remove('visible');
            } else {
                userError.classList.add('visible');
            }
        });

        // Выход
        function logout() {
            loggedIn = false;
            sessionType = null;
            sessionUser = null;
            clearSession();
            showLoginForms();
            switchMode(currentMode);
        }
        logoutAdmin.addEventListener('click', logout);
        logoutUser.addEventListener('click', logout);

        // Генерация кодов
        generateCode.addEventListener('click', createPromoCode);

        // Активация
        activateBtn.addEventListener('click', activatePromoCode);
        activateCode.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') activatePromoCode();
        });

        // Переключение режимов
        switchAdmin.addEventListener('click', () => switchMode('admin'));
        switchUser.addEventListener('click', () => switchMode('user'));

        // Инициализация сессии
        loadSession();
        if (!loggedIn) {
            showLoginForms();
            switchMode('admin');
        } else {
            if (sessionType === 'admin') {
                showAdminPanel();
                switchMode('admin');
            } else {
                showUserPanel(sessionUser);
                switchMode('user');
            }
        }

        // Telegram WebApp
        if (window.Telegram?.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }
    </script>
</body>
</html>
